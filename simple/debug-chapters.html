<!DOCTYPE html>
<html>
<head>
    <title>Debug Chapters Modal</title>
    <style>
        /* Copy the chapters modal CSS */
        #chapters-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.4);
            z-index: 9000;
        }

        #chapters-modal.show,
        #chapters-modal[style*="flex"] {
            display: flex !important;
            align-items: center;
            justify-content: center;
        }

        #chapters-modal .modal-content {
            position: relative;
            background-color: white;
            padding: 20px;
            width: 90%;
            max-width: 800px;
            border: 1px solid #ccc;
            border-radius: 10px;
            max-height: 90vh;
            overflow-y: auto;
        }

        #chapters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .chapter-card {
            background-color: #f9f9f9;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            text-align: center;
        }

        .chapter-title {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .chapter-points {
            font-size: 0.9em;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>Debug Chapters Modal Test</h1>
    <button onclick="showModal()">Show Chapters Modal</button>
    <button onclick="hideModal()">Hide Chapters Modal</button>
    
    <!-- Chapters Grid Modal -->
    <div id="chapters-modal" class="modal">
        <div class="modal-content">
            <span id="close-chapters-modal" class="close" onclick="hideModal()">&times;</span>
            <h2>Available Chapters</h2>
            <div id="chapters-grid">
                <div class="chapter-card">
                    <div class="chapter-title">Chapter 1</div>
                    <div class="chapter-points">Points: 0</div>
                </div>
                <div class="chapter-card">
                    <div class="chapter-title">Chapter 2</div>
                    <div class="chapter-points">Points: 0</div>
                </div>
                <div class="chapter-card">
                    <div class="chapter-title">Chapter 3</div>
                    <div class="chapter-points">Points: 0</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showModal() {
            console.log("Showing chapters modal");
            const chaptersModal = document.getElementById('chapters-modal');
            if (chaptersModal) {
                chaptersModal.style.display = 'flex';
                console.log("Chapters modal display set to flex");
                console.log("Modal computed style:", window.getComputedStyle(chaptersModal).display);
            } else {
                console.error("chapters-modal element not found");
            }
        }

        function hideModal() {
            console.log("Hiding chapters modal");
            const chaptersModal = document.getElementById('chapters-modal');
            if (chaptersModal) {
                chaptersModal.style.display = 'none';
            }
        }
    </script>
</body>
</html>
